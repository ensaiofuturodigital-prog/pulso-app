name: Compute Indicator Stats

on:
  schedule:
    - cron: '45 12 * * *'  # todo dia às 12h45 UTC (9h45 Brasília), depois dos outros robôs
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/compute-stats.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
