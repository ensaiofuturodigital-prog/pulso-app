name: Fetch USD/BRL Data (Yahoo)

on:
  schedule:
    - cron: '0,30 12-21 * * 1-5'  # de 30 em 30 min, 9h00-18h30 Brasília (12h-21h30 UTC), seg-sex
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-usdbrl.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
