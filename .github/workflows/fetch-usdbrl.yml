name: Fetch USD/BRL Data (Yahoo)

on:
  schedule:
    - cron: '15 10 * * *'  # todo dia às 10h15 UTC (7h15 Brasília), entre o BCB e o Ibovespa
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-usdbrl.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
