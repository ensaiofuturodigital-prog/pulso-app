name: Fetch BCB Data

on:
  schedule:
    - cron: '10 10 * * *'       # rodada principal: 10h10 UTC (7h10 Brasília)
    - cron: '2-59/5 11-21 * * 1-5'  # pós-divulgação: de 5 em 5 min, ~8h-18h55 Brasília, dias úteis
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-bcb.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
