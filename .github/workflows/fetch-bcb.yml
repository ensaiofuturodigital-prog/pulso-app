name: Fetch BCB Data

on:
  schedule:
    - cron: '10 10 * * *'         # rodada principal: 10h10 UTC (7h10 Brasília)
    - cron: '5,35 11-16 * * 1-5'  # pós-divulgação: de 30 em 30 min, 8h-13h Brasília, dias úteis
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-bcb.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
