name: Fetch FRED Data

on:
  schedule:
    - cron: '0 10 * * *'       # rodada principal: 10h UTC (7h Brasília)
    - cron: '*/5 11-21 * * 1-5'  # pós-divulgação: de 5 em 5 min, ~8h-18h55 Brasília, dias úteis
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-fred.js
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
