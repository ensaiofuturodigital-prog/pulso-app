name: Fetch FOMC Dates

on:
  schedule:
    - cron: '0 6 1 * *'  # todo dia 1º do mês às 6h UTC (barato, não precisa rodar todo dia)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node scripts/fetch-fomc-dates.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
